<!DOCTYPE html>
<html>
<head>
<title>AI Fitness Coach</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Fitness Coach</h1>

<input id="age" placeholder="Age">
<input id="height" placeholder="Height cm">
<input id="weight" placeholder="Weight kg">

<select id="goal">
<option>fat loss</option>
<option>muscle gain</option>
<option>endurance</option>
</select>

<input id="days" placeholder="Workout days">

<input id="equipment" placeholder="Equipment">

<button onclick="generate()">Generate Plan</button>

<pre id="result"></pre>

<script src="app.js"></script>

</body>
</html>
